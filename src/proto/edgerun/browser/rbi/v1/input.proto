syntax = "proto3";

package edgerun.browser.rbi.v1;

enum KeyEventType {
  KEY_EVENT_TYPE_UNSPECIFIED = 0;
  KEY_EVENT_TYPE_DOWN = 1;
  KEY_EVENT_TYPE_UP = 2;
}

message KeyEvent {
  KeyEventType type = 1;
  string code = 2;
  string key = 3;
  bool alt = 4;
  bool ctrl = 5;
  bool shift = 6;
  bool meta = 7;
}

enum MouseEventType {
  MOUSE_EVENT_TYPE_UNSPECIFIED = 0;
  MOUSE_EVENT_TYPE_MOVE = 1;
  MOUSE_EVENT_TYPE_DOWN = 2;
  MOUSE_EVENT_TYPE_UP = 3;
}

message MouseEvent {
  MouseEventType type = 1;
  sint32 x = 2;
  sint32 y = 3;
  uint32 button = 4;
  uint32 buttons = 5;
  bool alt = 6;
  bool ctrl = 7;
  bool shift = 8;
  bool meta = 9;
}

message WheelEvent {
  sint32 x = 1;
  sint32 y = 2;
  float delta_x = 3;
  float delta_y = 4;
  bool alt = 5;
  bool ctrl = 6;
  bool shift = 7;
  bool meta = 8;
}

message TextInputEvent {
  string text = 1;
}

message FocusEvent {
  bool focused = 1;
}

message InputEvent {
  uint64 event_seq = 1;
  uint64 client_timestamp_ms = 2;
  oneof payload {
    KeyEvent key = 3;
    MouseEvent mouse = 4;
    WheelEvent wheel = 5;
    TextInputEvent text = 6;
    FocusEvent focus = 7;
  }
}

message InputBatch {
  string session_id = 1;
  uint64 batch_seq = 2;
  repeated InputEvent events = 3;
}
