syntax = "proto3";

package edgerun.browser.rbi.v1;

message Viewport {
  uint32 width = 1;
  uint32 height = 2;
  float device_scale_factor = 3;
}

message NavigationPolicy {
  repeated string allowed_origin_prefixes = 1;
  bool block_file_scheme = 2;
  bool block_data_scheme = 3;
}

message BrowserCapabilities {
  bool clipboard_read = 1;
  bool clipboard_write = 2;
  bool file_upload = 3;
  bool persistent_storage = 4;
}

message SessionStartRequest {
  string client_instance_id = 1;
  string requested_url = 2;
  Viewport viewport = 3;
  BrowserCapabilities capabilities = 4;
  NavigationPolicy navigation_policy = 5;
}

message SessionStarted {
  string session_id = 1;
  string effective_url = 2;
  uint64 server_epoch_ms = 3;
}

enum SessionCommandType {
  SESSION_COMMAND_TYPE_UNSPECIFIED = 0;
  SESSION_COMMAND_NAVIGATE = 1;
  SESSION_COMMAND_RELOAD = 2;
  SESSION_COMMAND_PAUSE_INPUT = 3;
  SESSION_COMMAND_RESUME_INPUT = 4;
  SESSION_COMMAND_CLOSE = 5;
}

message SessionControl {
  string session_id = 1;
  SessionCommandType command = 2;
  string target_url = 3;
}

enum SessionEventKind {
  SESSION_EVENT_KIND_UNSPECIFIED = 0;
  SESSION_EVENT_KIND_READY = 1;
  SESSION_EVENT_KIND_NAVIGATED = 2;
  SESSION_EVENT_KIND_LOAD_STARTED = 3;
  SESSION_EVENT_KIND_LOAD_FINISHED = 4;
  SESSION_EVENT_KIND_CLOSED = 5;
}

message SessionEvent {
  string session_id = 1;
  SessionEventKind kind = 2;
  string url = 3;
  string detail = 4;
  uint64 server_timestamp_ms = 5;
}
