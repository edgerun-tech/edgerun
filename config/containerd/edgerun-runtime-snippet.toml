# Additive containerd snippet for selectable runtimes:
# - `crun` is default for OCI containers.
# - `edgerun` is opt-in for EdgeRun/WASI workloads.

[plugins.'io.containerd.cri.v1.runtime'.containerd]
  default_runtime_name = 'crun'
  snapshotter = 'overlayfs'

[plugins.'io.containerd.cri.v1.runtime'.containerd.runtimes.crun]
  runtime_type = 'io.containerd.runc.v2'
  privileged_without_host_devices = false
  [plugins.'io.containerd.cri.v1.runtime'.containerd.runtimes.crun.options]
    BinaryName = '/usr/bin/crun'
    SystemdCgroup = true

[plugins.'io.containerd.cri.v1.runtime'.containerd.runtimes.edgerun]
  runtime_type = 'io.containerd.edgerun.v1'
  privileged_without_host_devices = false
  [plugins.'io.containerd.cri.v1.runtime'.containerd.runtimes.edgerun.options]
    BinaryName = '/usr/bin/containerd-shim-edgerun-v2'
    SystemdCgroup = true
