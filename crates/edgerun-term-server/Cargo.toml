[package]
name = "edgerun-term-server"
version.workspace = true
edition = "2024"
license.workspace = true

[dependencies]
anyhow = "1"
axum = { version = "0.7", features = ["ws"] }
portable-pty = "0.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
tower-http = { version = "0.5", features = ["fs"] }
