<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Term Web</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0c10;
      --fg: #c5c8d3;
      --accent: #3fa9f5;
      --status: #141722;
      --status-border: #223049;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "JetBrains Mono", "Source Code Pro", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      overflow: hidden;
    }
    #app {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: 1fr auto;
    }
    #term-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: var(--bg);
      outline: none;
    }
    #status {
      margin: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--status);
      border: 1px solid var(--status-border);
      font-size: 12px;
      letter-spacing: 0.01em;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    #status[hidden] { display: none; }
    #status .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      display: inline-block;
      box-shadow: 0 0 10px rgba(63, 169, 245, 0.6);
    }
    #term-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
      left: -1000px;
      top: -1000px;
      resize: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="term-canvas" tabindex="0"></canvas>
    <div id="status" role="status">
      <span class="dot"></span>
      <span id="status-text">Loading terminal…</span>
    </div>
  </div>
  <textarea id="term-input" aria-hidden="true"></textarea>
  <script type="module">
    import init from "./pkg/term_web.js";

    const statusText = document.getElementById("status-text");
    const status = document.getElementById("status");

    function setStatus(text) {
      if (!status || !statusText) return;
      if (!text) {
        status.hidden = true;
        statusText.textContent = "";
        return;
      }
      status.hidden = false;
      statusText.textContent = text;
    }

    (async () => {
      try {
        await init();
        setStatus("");
      } catch (err) {
        console.error("Term init failed", err);
        setStatus(String(err));
      }
    })();
  </script>
</body>
</html>
