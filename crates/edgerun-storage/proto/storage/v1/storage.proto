syntax = "proto3";

package edgerun.storage.v1;

message AppendRecordRequestV1 {
  uint32 schema_version = 1;
  string storage_id = 2;
  string stream_id = 3;
  string actor_id = 4;
  bytes payload = 5;
  uint64 expected_offset = 6;
}

message AppendRecordResultV1 {
  uint32 schema_version = 1;
  string storage_id = 2;
  uint64 offset = 3;
  uint64 wire_len = 4;
  bytes event_hash = 5;
  string event_id = 6;
}

message QueryEventsRequestV1 {
  uint32 schema_version = 1;
  string storage_id = 2;
  uint64 cursor_offset = 3;
  uint32 limit = 4;
}

message QueriedEventV1 {
  uint64 offset = 1;
  uint64 wire_len = 2;
  bytes event_hash = 3;
  bytes event_payload = 4;
}

message QueryEventsResultV1 {
  uint32 schema_version = 1;
  repeated QueriedEventV1 events = 2;
  uint64 next_cursor_offset = 3;
  bool has_next_cursor = 4;
}

message StorageCheckpointV1 {
  uint32 schema_version = 1;
  string storage_id = 2;
  uint64 last_offset = 3;
  string last_event_id = 4;
  uint64 persisted_at_unix_ms = 5;
}

message SegmentSealedEventV1 {
  uint32 schema_version = 1;
  string storage_id = 2;
  string segment_file = 3;
  bytes segment_id = 4;
  uint64 sealed_at_unix_ms = 5;
}

message HlcTimestampV1 {
  int64 physical = 1;
  uint32 logical = 2;
}

message SealedSegmentV1 {
  bytes segment_id = 1;
  uint64 offset = 2;
  uint64 size = 3;
  HlcTimestampV1 min_hlc = 4;
  HlcTimestampV1 max_hlc = 5;
}

message IndexRootsV1 {
  bytes event_hash_index = 1;
  bytes stream_index = 2;
  bytes time_index = 3;
  bytes materialized_state_index = 4;
}

message ManifestCheckpointV1 {
  bytes segment_id = 1;
  uint64 offset = 2;
  HlcTimestampV1 hlc = 3;
}

message ManifestV1 {
  bytes store_uuid = 1;
  uint64 epoch = 2;
  repeated SealedSegmentV1 sealed_segments = 3;
  SealedSegmentV1 active_segment = 4;
  IndexRootsV1 index_roots = 5;
  ManifestCheckpointV1 last_checkpoint = 6;
  uint64 compaction_watermark = 7;
  uint32 manifest_crc = 8;
}
