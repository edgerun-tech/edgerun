<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EdgeRun Control Panel</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-title">EdgeRun Control Panel</div>
    <div class="topbar-actions">
      <button id="toggleTerminalBtn" type="button">Terminal</button>
    </div>
  </header>

  <main class="wrap">
    <h1>EdgeRun Control Panel</h1>
    <p>Trigger project workflows and monitor latest status.</p>

    <div class="toolbar">
      <input id="search" placeholder="Search task..." />
      <select id="group">
        <option value="all">All Groups</option>
        <option value="Core">Core</option>
        <option value="Build">Build</option>
        <option value="Test">Test</option>
        <option value="Run">Run</option>
        <option value="Storage">Storage</option>
        <option value="CI">CI</option>
      </select>
      <select id="stateFilter">
        <option value="all">All States</option>
        <option value="running">Running</option>
        <option value="failed">Failed</option>
        <option value="success">Success</option>
        <option value="idle">Idle</option>
      </select>
    </div>

    <div id="summary" class="summary"></div>
    <div id="tasks" class="grid"></div>
  </main>

  <section id="termDrawer" class="term-drawer closed" aria-label="Terminal Drawer">
    <div id="termResizer" class="term-resizer"></div>
    <div class="term-header">
      <div id="termTabs" class="term-tabs"></div>
      <div class="term-controls">
        <input id="termBaseUrl" type="text" placeholder="/term/" />
        <button id="termNewTab" type="button">+ Tab</button>
        <button id="termSplitCols" type="button">Split V</button>
        <button id="termSplitRows" type="button">Split H</button>
        <button id="termSingle" type="button">Single</button>
        <button id="termCloseTab" type="button">Close</button>
      </div>
    </div>
    <div id="termPaneHost" class="term-pane-host"></div>
  </section>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
