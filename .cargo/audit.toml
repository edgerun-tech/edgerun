[advisories]
# Temporary triage for vulnerabilities in transitive dependency chains
# that are not linked into edgerun-runtime binary paths.
# Remove these ignores once upstream dependency upgrades land.
ignore = [
  "RUSTSEC-2022-0093", # ed25519-dalek 1.x signing oracle issue in legacy graphs
  "RUSTSEC-2024-0344", # curve25519-dalek 3.x timing variability via ed25519-dalek 1.x chains
  "RUSTSEC-2021-0145", # atty potential unaligned read in legacy dependency chains
]
