services:
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.scheduler
    environment:
      EDGERUN_SCHEDULER_ADDR: 0.0.0.0:8090
      EDGERUN_SCHEDULER_BASE_URL: http://127.0.0.1:8090
      EDGERUN_SCHEDULER_DATA_DIR: /var/lib/edgerun/scheduler
      EDGERUN_SCHEDULER_REQUIRE_CHAIN_CONTEXT: "false"
    ports:
      - "8090:8090"
    volumes:
      - scheduler-data:/var/lib/edgerun/scheduler

  term-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.term-server
    depends_on:
      - scheduler
    environment:
      EDGERUN_HARDWARE_MODE: allow-software
      EDGERUN_TERM_SERVER_ADDR: 0.0.0.0:8080
      EDGERUN_TERM_PUBLIC_BASE_URL: http://127.0.0.1:8080
      EDGERUN_ROUTE_CONTROL_BASE: http://scheduler:8090
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    depends_on:
      - scheduler
      - term-server
    ports:
      - "4173:80"

volumes:
  scheduler-data:
