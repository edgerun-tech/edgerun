services:
  mcp-syscall:
    container_name: edgerun-mcp-syscall
    build:
      context: .
      dockerfile: docker/mcp-syscall/Dockerfile
    image: edgerun/mcp-syscall:local
    restart: unless-stopped
    network_mode: host
    environment:
      MCP_ADDR: ${MCP_SYSCALL_ADDR:-127.0.0.1:7047}
      MCP_STATE_DIR: /var/lib/mcp-syscall
      MCP_CODE_EDIT_SUBMIT_ONLY: ${MCP_CODE_EDIT_SUBMIT_ONLY:-1}
      MCP_CODE_EDIT_PROTECT_CWD: ${MCP_CODE_EDIT_PROTECT_CWD:-1}
      MCP_CODE_EDIT_PROTECTED_ROOTS: ${MCP_CODE_EDIT_PROTECTED_ROOTS:-/workspace/edgerun}
      MCP_CODE_EDIT_REPO_ROOT: ${MCP_CODE_EDIT_REPO_ROOT:-/workspace/edgerun}
      MCP_STORAGE_VFS_OPERATOR_BIN: ${MCP_STORAGE_VFS_OPERATOR_BIN:-/var/cache/build/rust/target/release/vfs_operator}
      MCP_STORAGE_DATA_DIR: ${MCP_STORAGE_DATA_DIR:-/var/lib/mcp-syscall/storage}
      MCP_STORAGE_REPO_ID: ${MCP_STORAGE_REPO_ID:-edgerun}
      MCP_STORAGE_BRANCH: ${MCP_STORAGE_BRANCH:-main}
      MCP_STORAGE_AGENT_ID: ${MCP_STORAGE_AGENT_ID:-opencode-codex}
      MCP_STORAGE_GIT_REF: ${MCP_STORAGE_GIT_REF:-HEAD}
      MCP_STORAGE_INITIATED_BY: ${MCP_STORAGE_INITIATED_BY:-mcp-syscall}
      MCP_STORAGE_IMPORT_GIT_ON_SUBMIT: ${MCP_STORAGE_IMPORT_GIT_ON_SUBMIT:-1}
      MCP_STORAGE_AGENT_BOOTSTRAP_ENABLE: ${MCP_STORAGE_AGENT_BOOTSTRAP_ENABLE:-1}
      MCP_STORAGE_AGENT_BOOTSTRAP_LIMIT: ${MCP_STORAGE_AGENT_BOOTSTRAP_LIMIT:-20}
    working_dir: /workspace/mcp-syscall
    volumes:
      - ../mcp-syscall:/workspace/mcp-syscall
      - /home/ken/.codex:/root/.codex
      - /home/ken/src/edgerun:/workspace/edgerun
      - /var/cache/build/rust/target/release:/var/cache/build/rust/target/release:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - edgerun-mcp-state:/var/lib/mcp-syscall

  nats:
    container_name: edgerun-nats
    image: nats:2.11-alpine
    restart: unless-stopped
    command:
      - --name
      - edgerun-nats
      - --jetstream
      - --store_dir
      - /data
      - --http_port
      - "8222"
      - --port
      - "4222"
    ports:
      - "4222:4222"
      - "127.0.0.1:8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - edgerun-nats-data:/data

  node-manager:
    container_name: edgerun-node-manager
    build:
      context: .
      dockerfile: docker/node-manager/Dockerfile
    image: edgerun/node-manager:local
    restart: unless-stopped
    privileged: true
    network_mode: host
    command:
      - edgerun-node-manager
      - run
      - --local-bridge-listen
      - ${EDGERUN_LOCAL_BRIDGE_LISTEN:-127.0.0.1:7777}
    environment:
      EDGERUN_BOOT_POLICY_VERIFY_KEY_B64URL: ${EDGERUN_BOOT_POLICY_VERIFY_KEY_B64URL:-}
      EDGERUN_MCP_GITHUB_IMAGE: ${EDGERUN_MCP_GITHUB_IMAGE:-}
      EDGERUN_MCP_WHATSAPP_IMAGE: ${EDGERUN_MCP_WHATSAPP_IMAGE:-}
      EDGERUN_MCP_TELEGRAM_IMAGE: ${EDGERUN_MCP_TELEGRAM_IMAGE:-}
      EDGERUN_MCP_SIGNAL_IMAGE: ${EDGERUN_MCP_SIGNAL_IMAGE:-}
      EDGERUN_MCP_DISCORD_IMAGE: ${EDGERUN_MCP_DISCORD_IMAGE:-}
      EDGERUN_MCP_SLACK_IMAGE: ${EDGERUN_MCP_SLACK_IMAGE:-}
      EDGERUN_MCP_GOOGLE_MESSAGES_IMAGE: ${EDGERUN_MCP_GOOGLE_MESSAGES_IMAGE:-}
      EDGERUN_MCP_GVOICE_IMAGE: ${EDGERUN_MCP_GVOICE_IMAGE:-}
      EDGERUN_MCP_META_IMAGE: ${EDGERUN_MCP_META_IMAGE:-}
      EDGERUN_MCP_GOOGLECHAT_IMAGE: ${EDGERUN_MCP_GOOGLECHAT_IMAGE:-}
      EDGERUN_MCP_TWITTER_IMAGE: ${EDGERUN_MCP_TWITTER_IMAGE:-}
      EDGERUN_MCP_BLUESKY_IMAGE: ${EDGERUN_MCP_BLUESKY_IMAGE:-}
      EDGERUN_MCP_IMESSAGE_IMAGE: ${EDGERUN_MCP_IMESSAGE_IMAGE:-}
      EDGERUN_MCP_IMESSAGEGO_IMAGE: ${EDGERUN_MCP_IMESSAGEGO_IMAGE:-}
      EDGERUN_MCP_LINKEDIN_IMAGE: ${EDGERUN_MCP_LINKEDIN_IMAGE:-}
      EDGERUN_MCP_HEISENBRIDGE_IMAGE: ${EDGERUN_MCP_HEISENBRIDGE_IMAGE:-}
      EDGERUN_EVENTBUS_NATS_URL: ${EDGERUN_EVENTBUS_NATS_URL:-nats://127.0.0.1:4222}
      EDGERUN_INTEGRATION_TOPIC_ROOT: ${EDGERUN_INTEGRATION_TOPIC_ROOT:-edgerun.integrations}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /dev:/dev
      - /home/ken/src/edgerun:/workspace/edgerun
      - /home/ken/.config/BeeperTexts/media:/home/ken/.config/BeeperTexts/media:ro
      - edgerun-var-lib:/var/lib/edgerun
      - edgerun-etc:/etc/edgerun
      - edgerun-run:/run/edgerun

  cloudflared:
    container_name: edgerun-cloudflared
    image: cloudflare/cloudflared:2026.2.0
    user: "0:0"
    restart: unless-stopped
    profiles: ["tunnel"]
    network_mode: host
    command:
      - tunnel
      - --no-autoupdate
      - --config
      - /etc/cloudflared/config.yml
      - run
    volumes:
      - ./config/cloudflared/node-manager-tunnel.yml:/etc/cloudflared/config.yml:ro
      - ./config/cloudflared/node-manager-tunnel-credentials.json:/etc/cloudflared/creds/node-manager-tunnel-credentials.json:ro

  framework-frontend:
    container_name: edgerun-framework-frontend
    image: oven/bun:1.3.9
    restart: unless-stopped
    profiles: ["tunnel"]
    network_mode: host
    working_dir: /workspace/frontend
    command:
      - /bin/sh
      - -lc
      - |
        bun install --frozen-lockfile
        last_sig=""
        while true; do
          sig="$$(find /workspace/frontend/intent-ui /workspace/frontend/public /workspace/frontend/scripts/build-intent-ui-dev.mjs -type f -printf '%p %T@ %s\n' 2>/dev/null | LC_ALL=C sort | sha256sum | awk '{print $$1}')"
          if [ "$$sig" != "$$last_sig" ]; then
            bun scripts/build-intent-ui-dev.mjs || true
            last_sig="$$sig"
          fi
          sleep 1
        done
    environment:
      EDGERUN_API_URL: https://api.edgerun.tech
    volumes:
      - ./:/workspace

  framework-e2e-manager:
    container_name: edgerun-framework-e2e-manager
    image: oven/bun:1.3.9
    restart: unless-stopped
    profiles: ["e2e"]
    network_mode: host
    working_dir: /workspace/frontend
    command:
      - /bin/sh
      - -lc
      - |
        bun install --frozen-lockfile
        last_sig=""
        while true; do
          sig="$$(find /workspace/frontend/intent-ui /workspace/frontend/public /workspace/frontend/scripts /workspace/frontend/cypress/e2e -type f -printf '%p %T@ %s\n' 2>/dev/null | LC_ALL=C sort | sha256sum | awk '{print $$1}')"
          if [ "$$sig" != "$$last_sig" ]; then
            echo "[framework-e2e-manager] change detected, rebuilding and running checks"
            INTENT_UI_DEV_OUT_DIR=/workspace/out/frontend/framework-e2e bun scripts/build-intent-ui-dev.mjs || true
            bun run check || true
            PORT=4199
            bunx --bun serve /workspace/out/frontend/framework-e2e -p "$$PORT" >/tmp/framework-e2e-serve.log 2>&1 &
            SERVER_PID=$$!
            sleep 1
            bunx --bun cypress run --config-file cypress.config.ts --config baseUrl=http://127.0.0.1:$$PORT --browser electron --spec cypress/e2e/intent-ui-file-manager-node-selector.cy.js || true
            kill "$$SERVER_PID" >/dev/null 2>&1 || true
            wait "$$SERVER_PID" >/dev/null 2>&1 || true
            last_sig="$$sig"
          fi
          sleep 1
        done
    environment:
      EDGERUN_API_URL: https://api.edgerun.tech
    volumes:
      - ./:/workspace

  opencode-cli:
    container_name: edgerun-opencode-cli
    image: node:22-bookworm
    restart: unless-stopped
    network_mode: host
    working_dir: /workspace/edgerun
    environment:
      HOME: /home/ken
    command:
      - /bin/sh
      - -lc
      - |
        exec tail -f /dev/null
    volumes:
      - /home/ken/src/edgerun:/workspace/edgerun
      - /usr/bin/opencode:/usr/local/bin/opencode:ro
      - /home/ken/.config/opencode:/home/ken/.config/opencode
      - /home/ken/.local/share/opencode:/home/ken/.local/share/opencode
      - /home/ken/.local/state/opencode:/home/ken/.local/state/opencode

  caddy:
    container_name: edgerun-framework-caddy
    image: caddy:2.10.0
    restart: unless-stopped
    profiles: ["tunnel"]
    network_mode: host
    command:
      - caddy
      - run
      - --config
      - /etc/caddy/Caddyfile
      - --adapter
      - caddyfile
    volumes:
      - ./config/caddy/framework.Caddyfile:/etc/caddy/Caddyfile:ro
      - ./:/workspace:ro

volumes:
  edgerun-mcp-state: {}
  edgerun-nats-data: {}
  edgerun-var-lib: {}
  edgerun-etc: {}
  edgerun-run: {}
