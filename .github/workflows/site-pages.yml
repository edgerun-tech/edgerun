name: Site Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend/node_modules
          key: bun-frontend-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-frontend-${{ runner.os }}-

      - name: Metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="main"
          fi
          TAGS="$(git tag --sort=-version:refname | sed 's/^v//' | head -n 10 | paste -sd, -)"
          if [[ -z "$TAGS" ]]; then
            TAGS="$VERSION"
          fi
          BUILD_NUMBER="${VERSION}-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "versions=$TAGS" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Install
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Build static site
        env:
          EDGERUN_VERSION: ${{ steps.meta.outputs.version }}
          EDGERUN_VERSIONS: ${{ steps.meta.outputs.versions }}
          EDGERUN_BUILD_NUMBER: ${{ steps.meta.outputs.build_number }}
          EDGERUN_SITE_URL: https://www.edgerun.tech
          EDGERUN_SITE_DOMAIN: www.edgerun.tech
          EDGERUN_API_URL: https://api.edgerun.tech
        run: bun run build
        working-directory: frontend

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/frontend/site

      - name: Upload wiki artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiki-docs-${{ steps.meta.outputs.version }}
          path: out/frontend/wiki

  deploy:
    runs-on: ubuntu-24.04
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: cloudflare-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: /tmp/edgerun-pages-artifact

      - name: Extract site artifact
        run: |
          set -euo pipefail
          rm -rf out/frontend/site
          mkdir -p out/frontend/site
          tar -xf /tmp/edgerun-pages-artifact/artifact.tar -C out/frontend/site

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]] || [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID secret" >&2
            exit 1
          fi
          bunx --bun wrangler deploy \
            --name edgerun-frontend \
            --compatibility-date 2026-02-22 \
            --assets out/frontend/site
