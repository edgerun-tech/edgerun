name: CI
run-name: "CI • ${{ github.ref_name }} • #${{ github.run_number }}"

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_GHA_VERSION: "v1"

jobs:
  changes:
    name: Detect Changed Scopes
    runs-on: ubuntu-24.04
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
      runtime: ${{ steps.filter.outputs.runtime }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/frontend-release.yml'
              - '.github/workflows/wiki-sync.yml'
              - 'scripts/e2e-frontend-all.sh'
              - 'scripts/e2e-frontend-core.sh'
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'edgerun/Cargo.toml'
              - 'edgerun/Cargo.lock'
              - 'edgerun/crates/**'
            runtime:
              - 'crates/edgerun-runtime/**'
              - 'crates/edgerun-runtime-web/**'
            ci:
              - '.github/workflows/ci.yml'
              - 'scripts/check-workflow-drift.sh'

      - name: Publish detected scope summary
        run: |
          {
            echo "## CI Scope Detection"
            echo ""
            echo "- frontend: \`${{ steps.filter.outputs.frontend }}\`"
            echo "- rust: \`${{ steps.filter.outputs.rust }}\`"
            echo "- runtime: \`${{ steps.filter.outputs.runtime }}\`"
            echo "- ci: \`${{ steps.filter.outputs.ci }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-gates:
    name: Frontend Production Gates
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend/node_modules
          key: bun-frontend-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-frontend-${{ runner.os }}-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Frontend static quality gates
        run: bun run check
        working-directory: frontend

      - name: Frontend validated production build
        env:
          EDGERUN_VERSION: ci-${{ github.sha }}
          EDGERUN_VERSIONS: ci
          EDGERUN_BUILD_NUMBER: ci-${{ github.run_number }}-${{ github.sha }}
          EDGERUN_SITE_URL: https://www.edgerun.tech
          EDGERUN_SITE_DOMAIN: www.edgerun.tech
          EDGERUN_API_URL: https://api.edgerun.tech
          SOLANA_CLUSTER: devnet
          SOLANA_RPC_URL: https://api.devnet.solana.com
          EDGERUN_TREASURY_ACCOUNT: ""
        run: bun run build:prod
        working-directory: frontend

  build-timing-main:
    name: Build Timing (Main)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Run timed build pipeline
        run: cargo run -p edgerun-cli -- --root . ci --job build-timing-main

      - name: Upload timing artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-timings-main-${{ github.run_id }}
          path: out/ci/build-timings.json

  rust-checks:
    name: Rust Checks
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: SPDX header check
        run: cargo run -p edgerun-cli -- --root . ci --job spdx-check

      - name: Format check
        run: cargo fmt --all --check

      - name: Workspace check
        run: cargo check --workspace

      - name: Clippy (term crates strict)
        run: >
          cargo clippy
          -p edgerun-term-core
          -p edgerun-term-ui
          -p edgerun-term-native
          -p edgerun-term-web
          --all-targets
          -- -D warnings

      - name: Clippy (strict)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Workspace tests (nextest)
        run: |
          mkdir -p /tmp/edgerun-ci-artifacts
          cargo nextest run --workspace --junit-xml /tmp/edgerun-ci-artifacts/nextest-junit.xml

      - name: Matrix validation references check
        run: cargo run -p edgerun-cli -- --root . ci --job matrix-check

      - name: Upload rust test report artifacts
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: rust-test-reports-${{ runner.os }}-${{ runner.arch }}
          path: /tmp/edgerun-ci-artifacts/nextest-junit.xml

  coverage:
    name: Coverage (llvm-cov)
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate workspace coverage report
        run: |
          mkdir -p /tmp/edgerun-coverage
          cargo llvm-cov clean --workspace
          cargo llvm-cov \
            --workspace \
            --all-targets \
            --summary-only \
            --lcov \
            --output-path /tmp/edgerun-coverage/lcov.info
          cargo llvm-cov \
            --workspace \
            --all-targets \
            --summary-only \
            --json \
            --output-path /tmp/edgerun-coverage/coverage-summary.json

      - name: Upload coverage artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: workspace-coverage-${{ runner.os }}-${{ runner.arch }}
          path: |
            /tmp/edgerun-coverage/lcov.info
            /tmp/edgerun-coverage/coverage-summary.json

  integration:
    name: Integration
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Scheduler API integration
        run: cargo run -p edgerun-cli -- --root . test integration

      - name: E2E lifecycle integration
        run: cargo run -p edgerun-cli -- --root . test e2e

      - name: Policy rotation integration
        run: cargo run -p edgerun-cli -- --root . test rotation

      - name: ABI rollover integration
        run: cargo run -p edgerun-cli -- --root . test abi-rollover

  runtime-determinism:
    name: Runtime Determinism (${{ matrix.os }})
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.runtime == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Replay corpus determinism gate
        run: |
          mkdir -p /tmp/edgerun-runtime-determinism
          cargo run -p edgerun-runtime --features cli -- replay-corpus \
            --profile "${{ runner.os }}-${{ runner.arch }}" \
            --artifact /tmp/edgerun-runtime-determinism/replay-corpus.json \
            --runs 3

      - name: Upload replay artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: replay-corpus-${{ runner.os }}-${{ runner.arch }}
          path: /tmp/edgerun-runtime-determinism/replay-corpus.json

  runtime-calibration:
    name: Runtime Fuel Calibration
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.runtime == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Fuel calibration gate
        run: |
          mkdir -p /tmp/edgerun-runtime-calibration
          cargo run -p edgerun-runtime --features cli -- calibrate-fuel \
            --profile "${{ runner.os }}-${{ runner.arch }}" \
            --artifact /tmp/edgerun-runtime-calibration/fuel-calibration.json \
            --runs 3 \
            --max-per-unit-spread 0.4

      - name: Upload calibration artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: fuel-calibration-${{ runner.os }}-${{ runner.arch }}
          path: /tmp/edgerun-runtime-calibration/fuel-calibration.json

  runtime-slo:
    name: Runtime SLO Smoke
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.runtime == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Runtime SLO smoke gate
        run: |
          mkdir -p /tmp/edgerun-runtime-slo
          cargo run -p edgerun-runtime --features cli -- slo-smoke \
            --profile "${{ runner.os }}-${{ runner.arch }}" \
            --artifact /tmp/edgerun-runtime-slo/slo-smoke.json \
            --runs 50 \
            --max-p95-ms 100 \
            --min-ops-per-sec 30

      - name: Upload SLO artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: slo-smoke-${{ runner.os }}-${{ runner.arch }}
          path: /tmp/edgerun-runtime-slo/slo-smoke.json

  runtime-fuzz-sanity:
    name: Runtime Fuzz Sanity
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@cargo-fuzz

      - name: Fuzz sanity runs
        working-directory: crates/edgerun-runtime/fuzz
        run: |
          cargo +nightly fuzz run fuzz_bundle_decode -- -max_total_time=15
          cargo +nightly fuzz run fuzz_validate_wasm -- -max_total_time=15
          cargo +nightly fuzz run fuzz_hostcall_boundary -- -max_total_time=15

  runtime-ub-safety:
    name: Runtime UB Safety (Miri/ASan/UBSan)
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (nightly + miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Miri checks (runtime lib tests)
        run: |
          cargo +nightly miri setup
          MIRIFLAGS="-Zmiri-disable-isolation -Zmiri-strict-provenance" \
            cargo +nightly miri test -p edgerun-runtime --lib

      - name: AddressSanitizer checks
        run: |
          RUSTFLAGS="-Zsanitizer=address" \
          cargo +nightly test -p edgerun-runtime --lib --target x86_64-unknown-linux-gnu -- --test-threads=1

      - name: LeakSanitizer checks
        run: |
          RUSTFLAGS="-Zsanitizer=leak" \
          cargo +nightly test -p edgerun-runtime --lib --target x86_64-unknown-linux-gnu -- --test-threads=1

  runtime-security:
    name: Runtime Security Gates
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Validate external review ledger
        run: cargo run -p edgerun-cli -- --root . validate-security --path crates/edgerun-runtime/SECURITY_FINDINGS.json

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Dependency vulnerability audit
        run: cargo audit

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@cargo-cyclonedx

      - name: Generate runtime SBOM
        run: |
          mkdir -p /tmp/edgerun-runtime-security
          cargo cyclonedx \
            --manifest-path crates/edgerun-runtime/Cargo.toml \
            --format json \
            --override-filename runtime-sbom
          mv crates/edgerun-runtime/runtime-sbom.json /tmp/edgerun-runtime-security/runtime-sbom.json

      - name: Upload runtime SBOM artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: runtime-sbom-${{ runner.os }}-${{ runner.arch }}
          path: /tmp/edgerun-runtime-security

  program-localnet:
    name: Program Localnet
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies (program)
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            program/node_modules
          key: bun-program-${{ runner.os }}-${{ hashFiles('program/bun.lock') }}
          restore-keys: |
            bun-program-${{ runner.os }}-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: |
          cargo install --locked --force anchor-cli --version 0.31.1
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"

      - name: Verify Anchor CLI version
        run: |
          which anchor
          anchor --version
          "${CARGO_HOME:-$HOME/.cargo}/bin/anchor" --version

      - name: Install cargo-build-sbf (local program toolchain)
        run: cargo install cargo-build-sbf --version 4.0.0

      - name: Install program dependencies
        working-directory: program
        run: bun install --frozen-lockfile

      - name: Verify Gate (Rust + Anchor)
        run: cargo run -p edgerun-cli -- --root . ci --job verify

      - name: Program localnet tests
        run: cargo run -p edgerun-cli -- test program

  ci-summary:
    name: CI Summary
    if: ${{ always() }}
    needs:
      - changes
      - frontend-gates
      - build-timing-main
      - rust-checks
      - coverage
      - integration
      - runtime-determinism
      - runtime-calibration
      - runtime-slo
      - runtime-fuzz-sanity
      - runtime-ub-safety
      - runtime-security
      - program-localnet
    runs-on: ubuntu-24.04
    steps:
      - name: Publish CI run summary
        run: |
          {
            echo "## CI Run Summary"
            echo ""
            echo "- run: [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- ref: \`${{ github.ref_name }}\`"
            echo "- commit: \`${{ github.sha }}\`"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Detect Changed Scopes | ${{ needs.changes.result }} |"
            echo "| Frontend Production Gates | ${{ needs.frontend-gates.result }} |"
            echo "| Build Timing (Main) | ${{ needs.build-timing-main.result }} |"
            echo "| Rust Checks | ${{ needs.rust-checks.result }} |"
            echo "| Coverage (llvm-cov) | ${{ needs.coverage.result }} |"
            echo "| Integration | ${{ needs.integration.result }} |"
            echo "| Runtime Determinism | ${{ needs.runtime-determinism.result }} |"
            echo "| Runtime Fuel Calibration | ${{ needs.runtime-calibration.result }} |"
            echo "| Runtime SLO Smoke | ${{ needs.runtime-slo.result }} |"
            echo "| Runtime Fuzz Sanity | ${{ needs.runtime-fuzz-sanity.result }} |"
            echo "| Runtime UB Safety | ${{ needs.runtime-ub-safety.result }} |"
            echo "| Runtime Security Gates | ${{ needs.runtime-security.result }} |"
            echo "| Program Localnet | ${{ needs.program-localnet.result }} |"
            echo ""
            echo "## Artifacts (Machine Readable)"
            echo ""
            echo "- rust test reports artifact: \`rust-test-reports-\${runner.os}-\${runner.arch}\` (contains \`nextest-junit.xml\`)"
            echo "- coverage artifact: \`workspace-coverage-\${runner.os}-\${runner.arch}\` (contains \`lcov.info\` + \`coverage-summary.json\`)"
            echo "- runtime quality artifacts: \`replay-corpus-*\`, \`fuel-calibration-*\`, \`slo-smoke-*\`"
          } >> "$GITHUB_STEP_SUMMARY"
