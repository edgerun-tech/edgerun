name: CI
run-name: "CI • ${{ github.ref_name }} • #${{ github.run_number }}"

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect Changed Scopes
    runs-on: ubuntu-24.04
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'edgerun/Cargo.toml'
              - 'edgerun/Cargo.lock'
              - 'edgerun/crates/**'
            ci:
              - '.github/workflows/**'
              - 'scripts/check-workflow-drift.sh'
              - 'scripts/check-workflow-references.sh'
              - 'scripts/check-required-checks.sh'

      - name: Publish changed-scope summary
        run: |
          {
            echo "## Changed Scope"
            echo ""
            echo "- frontend: \`${{ steps.filter.outputs.frontend }}\`"
            echo "- rust: \`${{ steps.filter.outputs.rust }}\`"
            echo "- ci: \`${{ steps.filter.outputs.ci }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-gates:
    name: Frontend Production Gates
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: [self-hosted, linux, x64, proxmox, edgerun]
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache Bun dependencies
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend/node_modules
          key: bun-frontend-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-frontend-${{ runner.os }}-${{ runner.arch }}-
            bun-frontend-${{ runner.os }}-

      - name: Install frontend dependencies
        if: ${{ steps.bun-cache.outputs.cache-hit != 'true' }}
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Frontend quality checks
        working-directory: frontend
        run: bun run check

      - name: Frontend production build
        env:
          EDGERUN_VERSION: ci-${{ github.sha }}
          EDGERUN_VERSIONS: ci
          EDGERUN_BUILD_NUMBER: ci-${{ github.run_number }}-${{ github.sha }}
          EDGERUN_SITE_URL: https://www.edgerun.tech
          EDGERUN_SITE_DOMAIN: www.edgerun.tech
          EDGERUN_API_URL: https://api.edgerun.tech
        working-directory: frontend
        run: bun run build:prod

  rust-checks:
    name: Rust Checks
    needs: [changes]
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: [self-hosted, linux, x64, proxmox, edgerun]
    timeout-minutes: 12
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_GHA_VERSION: "v1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-shared-v1
          cache-all-crates: true

      - name: SPDX header check
        run: scripts/spdx-check.sh

      - name: Rust format check
        run: cargo fmt --all --check

      - name: Rust workspace check
        run: cargo check --workspace --all-targets

      - name: Rust clippy check
        if: ${{ github.event_name != 'pull_request' || startsWith(github.ref, 'refs/tags/v') }}
        run: cargo clippy --workspace --all-targets -- -D warnings

  ci-summary:
    name: CI Summary
    if: ${{ always() }}
    needs:
      - changes
      - frontend-gates
      - rust-checks
    runs-on: ubuntu-24.04
    steps:
      - name: Publish CI run summary
        run: |
          {
            echo "## CI Run Summary"
            echo ""
            echo "- run: [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "- ref: \`${{ github.ref_name }}\`"
            echo "- commit: \`${{ github.sha }}\`"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Detect Changed Scopes | ${{ needs.changes.result }} |"
            echo "| Frontend Production Gates | ${{ needs.frontend-gates.result }} |"
            echo "| Rust Checks | ${{ needs.rust-checks.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
