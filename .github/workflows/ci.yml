name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_GHA_VERSION: "v1"

jobs:
  build-timing-main:
    name: Build Timing (Main)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Run timed build pipeline
        run: cargo run -p edgerun-cli -- --root . ci --job build-timing-main

      - name: Upload timing artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-timings-main-${{ github.run_id }}
          path: out/ci/build-timings.json

  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: SPDX header check
        run: cargo run -p edgerun-cli -- --root . ci --job spdx-check

      - name: Format check
        run: cargo fmt --all --check

      - name: Workspace check
        run: cargo check --workspace

      - name: Clippy (term crates strict)
        run: >
          cargo clippy
          -p edgerun-term-core
          -p edgerun-term-ui
          -p edgerun-term-native
          -p edgerun-term-web
          --all-targets
          -- -D warnings

      - name: Clippy (strict)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Workspace tests (nextest)
        run: cargo nextest run --workspace

      - name: Matrix validation references check
        run: cargo run -p edgerun-cli -- --root . ci --job matrix-check

  coverage:
    name: Coverage (llvm-cov)
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate workspace coverage report
        run: |
          mkdir -p /tmp/edgerun-coverage
          cargo llvm-cov clean --workspace
          cargo llvm-cov \
            --workspace \
            --all-targets \
            --summary-only \
            --lcov \
            --output-path /tmp/edgerun-coverage/lcov.info

      - name: Upload coverage artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: workspace-coverage-${{ runner.os }}-${{ runner.arch }}
          path: /tmp/edgerun-coverage/lcov.info

  integration:
    name: Integration
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Scheduler API integration
        run: cargo run -p edgerun-cli -- --root . test integration

      - name: E2E lifecycle integration
        run: cargo run -p edgerun-cli -- --root . test e2e

      - name: Policy rotation integration
        run: cargo run -p edgerun-cli -- --root . test rotation

      - name: ABI rollover integration
        run: cargo run -p edgerun-cli -- --root . test abi-rollover

  runtime-determinism:
    name: Runtime Determinism (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Replay corpus determinism gate
        run: |
          mkdir -p /tmp/edgerun-runtime-determinism
          cargo run -p edgerun-runtime --features cli -- replay-corpus \
            --profile "${{ runner.os }}-${{ runner.arch }}" \
            --artifact /tmp/edgerun-runtime-determinism/replay-corpus.json \
            --runs 3

      - name: Upload replay artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: replay-corpus-${{ runner.os }}-${{ runner.arch }}
          path: /tmp/edgerun-runtime-determinism/replay-corpus.json

  runtime-calibration:
    name: Runtime Fuel Calibration
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Fuel calibration gate
        run: |
          mkdir -p /tmp/edgerun-runtime-calibration
          cargo run -p edgerun-runtime --features cli -- calibrate-fuel \
            --profile "${{ runner.os }}-${{ runner.arch }}" \
            --artifact /tmp/edgerun-runtime-calibration/fuel-calibration.json \
            --runs 3 \
            --max-per-unit-spread 0.4

      - name: Upload calibration artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: fuel-calibration-${{ runner.os }}-${{ runner.arch }}
          path: /tmp/edgerun-runtime-calibration/fuel-calibration.json

  runtime-slo:
    name: Runtime SLO Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Runtime SLO smoke gate
        run: |
          mkdir -p /tmp/edgerun-runtime-slo
          cargo run -p edgerun-runtime --features cli -- slo-smoke \
            --profile "${{ runner.os }}-${{ runner.arch }}" \
            --artifact /tmp/edgerun-runtime-slo/slo-smoke.json \
            --runs 50 \
            --max-p95-ms 100 \
            --min-ops-per-sec 30

      - name: Upload SLO artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: slo-smoke-${{ runner.os }}-${{ runner.arch }}
          path: /tmp/edgerun-runtime-slo/slo-smoke.json

  runtime-fuzz-sanity:
    name: Runtime Fuzz Sanity
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@cargo-fuzz

      - name: Fuzz sanity runs
        working-directory: crates/edgerun-runtime/fuzz
        run: |
          cargo +nightly fuzz run fuzz_bundle_decode -- -max_total_time=15
          cargo +nightly fuzz run fuzz_validate_wasm -- -max_total_time=15
          cargo +nightly fuzz run fuzz_hostcall_boundary -- -max_total_time=15

  runtime-ub-safety:
    name: Runtime UB Safety (Miri/ASan/UBSan)
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (nightly + miri)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Miri checks (runtime lib tests)
        run: |
          cargo +nightly miri setup
          MIRIFLAGS="-Zmiri-disable-isolation -Zmiri-strict-provenance" \
            cargo +nightly miri test -p edgerun-runtime --lib

      - name: AddressSanitizer checks
        run: |
          RUSTFLAGS="-Zsanitizer=address" \
          cargo +nightly test -p edgerun-runtime --lib --target x86_64-unknown-linux-gnu -- --test-threads=1

      - name: LeakSanitizer checks
        run: |
          RUSTFLAGS="-Zsanitizer=leak" \
          cargo +nightly test -p edgerun-runtime --lib --target x86_64-unknown-linux-gnu -- --test-threads=1

  runtime-security:
    name: Runtime Security Gates
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Validate external review ledger
        run: cargo run -p edgerun-cli -- --root . validate-security --path crates/edgerun-runtime/SECURITY_FINDINGS.json

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Dependency vulnerability audit
        run: cargo audit

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@cargo-cyclonedx

      - name: Generate runtime SBOM
        run: |
          mkdir -p /tmp/edgerun-runtime-security
          cargo cyclonedx \
            --manifest-path crates/edgerun-runtime/Cargo.toml \
            --format json \
            --override-filename runtime-sbom
          mv crates/edgerun-runtime/runtime-sbom.json /tmp/edgerun-runtime-security/runtime-sbom.json

      - name: Upload runtime SBOM artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: runtime-sbom-${{ runner.os }}-${{ runner.arch }}
          path: /tmp/edgerun-runtime-security

  program-localnet:
    name: Program Localnet
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies (program)
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            program/node_modules
          key: bun-program-${{ runner.os }}-${{ hashFiles('program/bun.lock') }}
          restore-keys: |
            bun-program-${{ runner.os }}-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: |
          cargo install --locked --force anchor-cli --version 0.31.1
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"

      - name: Verify Anchor CLI version
        run: |
          which anchor
          anchor --version
          "${CARGO_HOME:-$HOME/.cargo}/bin/anchor" --version

      - name: Install cargo-build-sbf (local program toolchain)
        run: cargo install cargo-build-sbf --version 4.0.0

      - name: Install program dependencies
        working-directory: program
        run: bun install --frozen-lockfile

      - name: Verify Gate (Rust + Anchor)
        run: cargo run -p edgerun-cli -- --root . ci --job verify

      - name: Program localnet tests
        run: cargo run -p edgerun-cli -- test program
