name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Workspace check
        run: cargo check --workspace

      - name: Runtime tests
        run: cargo test -p edgerun-runtime

      - name: Worker tests
        run: cargo test -p edgerun-worker

  integration:
    name: Integration
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Scheduler API integration
        run: ./scripts/integration_scheduler_api.sh

      - name: E2E lifecycle integration
        run: ./scripts/integration_e2e_lifecycle.sh

      - name: Policy rotation integration
        run: ./scripts/integration_policy_rotation.sh
