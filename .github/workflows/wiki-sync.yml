name: Wiki Sync
run-name: "Wiki Sync • #${{ github.run_number }}"

on:
  workflow_run:
    workflows: ["Frontend Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend/node_modules
          key: bun-frontend-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-frontend-${{ runner.os }}-

      - name: Frontend static quality gates
        run: |
          bun install --frozen-lockfile
          bun run check
        working-directory: frontend

      - name: Build wiki docs (validated production)
        env:
          EDGERUN_VERSION: main
          EDGERUN_VERSIONS: main
          EDGERUN_BUILD_NUMBER: wiki-${{ github.run_number }}-${{ github.sha }}
          EDGERUN_SITE_URL: https://www.edgerun.tech
          EDGERUN_SITE_DOMAIN: www.edgerun.tech
          EDGERUN_API_URL: https://api.edgerun.tech
        run: |
          bun run build:prod
        working-directory: frontend

      - name: Push wiki
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${WIKI_TOKEN:-}" ]]; then
            echo "WIKI_PUSH_TOKEN is not set; skipping wiki push."
            exit 0
          fi
          rm -rf /tmp/edgerun-wiki
          git clone "https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" /tmp/edgerun-wiki
          rsync -a --delete out/frontend/wiki/main/ /tmp/edgerun-wiki/
          cd /tmp/edgerun-wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -m "Update wiki docs from build ${GITHUB_RUN_NUMBER}"
            git push
          fi

      - name: Wiki route smoke check
        id: wiki_smoke
        run: |
          URLS=("https://www.edgerun.tech/" "https://www.edgerun.tech/docs")
          failed=0
          printf "| URL | HTTP | Result |\n| --- | --- | --- |\n" > /tmp/wiki-smoke-table.md
          for url in "${URLS[@]}"; do
            code="$(curl -L -sS -o /tmp/wiki-smoke-body -w "%{http_code}" --max-time 20 "${url}" || true)"
            if [[ "${code}" =~ ^[23] ]]; then
              printf "| %s | %s | pass |\n" "${url}" "${code}" >> /tmp/wiki-smoke-table.md
            else
              printf "| %s | %s | fail |\n" "${url}" "${code:-000}" >> /tmp/wiki-smoke-table.md
              failed=1
            fi
          done
          if [[ "${failed}" -eq 0 ]]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish wiki sync summary
        if: ${{ always() }}
        run: |
          {
            echo "## Wiki Sync Summary"
            echo ""
            echo "- trigger: \`${{ github.event_name }}\`"
            echo "- commit: \`${{ github.sha }}\`"
            echo "- workflow run conclusion gate: \`${{ github.event_name == 'workflow_dispatch' && 'manual' || github.event.workflow_run.conclusion }}\`"
            echo "- wiki output source: \`out/frontend/wiki/main/\`"
            echo "- wiki route smoke: \`${{ steps.wiki_smoke.outputs.result || 'n/a' }}\`"
            if [[ -f /tmp/wiki-smoke-table.md ]]; then
              echo ""
              cat /tmp/wiki-smoke-table.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"
