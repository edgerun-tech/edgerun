name: Frontend Release
run-name: "Frontend Release • ${{ github.ref_name }} • #${{ github.run_number }}"

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend/node_modules
          key: bun-frontend-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-frontend-${{ runner.os }}-

      - name: Metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAGS="$(git tag --sort=-version:refname | sed 's/^v//' | head -n 10 | paste -sd, -)"
          BUILD_NUMBER="${VERSION}-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "versions=$TAGS" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Install
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Frontend static quality gates
        run: bun run check
        working-directory: frontend

      - name: Build (validated production)
        env:
          EDGERUN_VERSION: ${{ steps.meta.outputs.version }}
          EDGERUN_VERSIONS: ${{ steps.meta.outputs.versions }}
          EDGERUN_BUILD_NUMBER: ${{ steps.meta.outputs.build_number }}
          EDGERUN_SITE_URL: https://www.edgerun.tech
          EDGERUN_SITE_DOMAIN: www.edgerun.tech
          EDGERUN_API_URL: https://api.edgerun.tech
          SOLANA_CLUSTER: devnet
          SOLANA_RPC_URL: https://api.devnet.solana.com
          EDGERUN_TREASURY_ACCOUNT: ""
        run: bun run build:prod
        working-directory: frontend

      - name: Archive artifacts
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/edgerun-site-${{ steps.meta.outputs.version }}.tar.gz" -C out/frontend/site .
          tar -czf "release-assets/edgerun-wiki-${{ steps.meta.outputs.version }}.tar.gz" -C out/frontend/wiki .

      - name: Publish
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

      - name: Publish frontend release summary
        if: ${{ always() }}
        run: |
          {
            echo "## Frontend Release Summary"
            echo ""
            echo "- version: \`${{ steps.meta.outputs.version }}\`"
            echo "- build number: \`${{ steps.meta.outputs.build_number }}\`"
            echo "- tags sample: \`${{ steps.meta.outputs.versions }}\`"
            echo "- release assets dir: \`release-assets/\`"
          } >> "$GITHUB_STEP_SUMMARY"
