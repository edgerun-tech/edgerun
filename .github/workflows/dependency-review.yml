name: Dependency Review
run-name: "Dependency Review • ${{ github.ref_name }} • #${{ github.run_number }}"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

      - name: Publish dependency review summary
        if: ${{ always() }}
        run: |
          {
            echo "## Dependency Review Summary"
            echo ""
            echo "- base branch: \`main\`"
            echo "- ref: \`${{ github.ref_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
