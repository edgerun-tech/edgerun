name: Push Scheduler
run-name: "Push Scheduler • ${{ inputs.ref || github.ref_name }} • #${{ github.run_number }}"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main
      remote_root:
        description: Remote repository path
        required: false
        default: /root/src/edgerun
      build_on_remote:
        description: Build binaries on remote host (1 or 0)
        required: false
        default: '1'
      restart_services:
        description: Restart scheduler stack services after sync (1 or 0)
        required: false
        default: '1'
      systemd_scope:
        description: systemd scope for service restarts
        required: false
        default: user
      services:
        description: Space-separated services to restart
        required: false
        default: edgerun-scheduler.service edgerun-worker@1.service edgerun-term-server.service
      dry_run:
        description: Validate inputs only
        type: boolean
        required: false
        default: false
      smoke_urls:
        description: Space-separated URLs for post-deploy smoke checks
        required: false
        default: ""
      smoke_enforce:
        description: Fail workflow when smoke checks fail
        type: boolean
        required: false
        default: false

jobs:
  push:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deploy runtime deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends openssh-client sshpass curl ca-certificates

      - name: Push to scheduler host
        env:
          SCHEDULER_HOST: ${{ secrets.EDGERUN_SCHEDULER_HOST }}
          SCHEDULER_USER: ${{ secrets.EDGERUN_SCHEDULER_USER }}
          SCHEDULER_PASSWORD: ${{ secrets.EDGERUN_SCHEDULER_PASSWORD }}
          SCHEDULER_PORT: ${{ secrets.EDGERUN_SCHEDULER_PORT }}
          SCHEDULER_SSH_KEY_FILE: ${{ secrets.EDGERUN_SCHEDULER_SSH_KEY_FILE }}
          SCHEDULER_REMOTE_ROOT: ${{ inputs.remote_root }}
          SCHEDULER_BUILD_ON_REMOTE: ${{ inputs.build_on_remote }}
          SCHEDULER_RESTART_SERVICES: ${{ inputs.restart_services }}
          SCHEDULER_SYSTEMD_SCOPE: ${{ inputs.systemd_scope }}
          SCHEDULER_SERVICES: ${{ inputs.services }}
          SCHEDULER_DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: ./scripts/push-scheduler.sh

      - name: Deployment smoke checks
        id: smoke
        if: ${{ !inputs.dry_run && inputs.smoke_urls != '' }}
        run: |
          failed=0
          printf "| URL | HTTP | Result |\n| --- | --- | --- |\n" > /tmp/push-scheduler-smoke-table.md
          for url in ${{ inputs.smoke_urls }}; do
            code="$(curl -L -sS -o /tmp/push-scheduler-smoke-body -w "%{http_code}" --max-time 20 "${url}" || true)"
            if [[ "${code}" =~ ^[23] ]]; then
              printf "| %s | %s | pass |\n" "${url}" "${code}" >> /tmp/push-scheduler-smoke-table.md
            else
              printf "| %s | %s | fail |\n" "${url}" "${code:-000}" >> /tmp/push-scheduler-smoke-table.md
              failed=1
            fi
          done
          if [[ "${failed}" -eq 0 ]]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce smoke checks
        if: ${{ always() && !inputs.dry_run && inputs.smoke_urls != '' && inputs.smoke_enforce && steps.smoke.outputs.result == 'fail' }}
        run: |
          echo "Smoke checks failed and smoke_enforce=true"
          exit 1

      - name: Publish scheduler push summary
        if: ${{ always() }}
        run: |
          RESOLVED_SHA="$(git rev-parse HEAD)"
          {
            echo "## Push Scheduler Summary"
            echo ""
            echo "- ref: \`${{ inputs.ref }}\`"
            echo "- resolved commit: \`${RESOLVED_SHA}\`"
            echo "- remote root: \`${{ inputs.remote_root }}\`"
            echo "- build on remote: \`${{ inputs.build_on_remote }}\`"
            echo "- restart services: \`${{ inputs.restart_services }}\`"
            echo "- systemd scope: \`${{ inputs.systemd_scope }}\`"
            echo "- services: \`${{ inputs.services }}\`"
            echo "- dry run: \`${{ inputs.dry_run }}\`"
            echo "- smoke urls: \`${{ inputs.smoke_urls || 'none' }}\`"
            echo "- smoke result: \`${{ steps.smoke.outputs.result || 'skipped' }}\`"
            echo "- smoke enforce: \`${{ inputs.smoke_enforce }}\`"
            if [[ -f /tmp/push-scheduler-smoke-table.md ]]; then
              echo ""
              cat /tmp/push-scheduler-smoke-table.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"
