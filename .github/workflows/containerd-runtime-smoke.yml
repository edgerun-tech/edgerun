name: Containerd Runtime Smoke
run-name: "Containerd Runtime Smoke • ${{ github.ref_name }} • #${{ github.run_number }}"

on:
  pull_request:
    paths:
      - "crates/edgerun-containerd-shim/**"
      - "crates/edgerun-runtime-proto/**"
      - "scripts/containerd-runtime-matrix-smoke.sh"
      - "scripts/containerd-runtime-wasm-smoke.sh"
      - "scripts/containerd-runtime-soak.sh"
      - "scripts/containerd/**"
      - "scripts/systemd/**"
      - ".github/workflows/containerd-runtime-smoke.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "crates/edgerun-containerd-shim/**"
      - "crates/edgerun-runtime-proto/**"
      - "scripts/containerd-runtime-matrix-smoke.sh"
      - "scripts/containerd-runtime-wasm-smoke.sh"
      - "scripts/containerd-runtime-soak.sh"
      - "scripts/containerd/**"
      - "scripts/systemd/**"
      - ".github/workflows/containerd-runtime-smoke.yml"
  workflow_dispatch:

concurrency:
  group: containerd-runtime-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: containerd + shim backend smoke
    runs-on: [self-hosted, linux, x64, proxmox, edgerun]
    timeout-minutes: 45
    env:
      NAMESPACE: default
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0

      - name: Setup sccache
        if: ${{ env.ACT != 'true' }}
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        if: ${{ env.ACT != 'true' }}
        uses: Swatinem/rust-cache@v2

      - name: Install runtime dependencies
        run: |
          set -euo pipefail
          command -v containerd >/dev/null 2>&1 || (echo "containerd is required on runner host" >&2; exit 1)
          command -v crun >/dev/null 2>&1 || (echo "crun is required on runner host" >&2; exit 1)
          command -v protoc >/dev/null 2>&1 || (echo "protobuf-compiler (protoc) is required on runner host" >&2; exit 1)

      - name: Build EdgeRun runtime binaries (rootless)
        run: |
          set -euo pipefail
          export CARGO_TARGET_DIR=out/target
          cargo build --locked --release \
            -p edgerun-containerd-shim \
            -p edgerun-runtime \
            --features edgerun-runtime/cli

      - name: Run runtime smoke + soak
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=out/target
          RUNTIME_BIN_DIR="$PWD/out/runtime-bin"
          mkdir -p "${RUNTIME_BIN_DIR}" out/containerd-runtime
          install -m0755 "${CARGO_TARGET_DIR}/release/containerd-shim-edgerun-v2" "${RUNTIME_BIN_DIR}/containerd-shim-edgerun-v2"
          ln -sf "${RUNTIME_BIN_DIR}/containerd-shim-edgerun-v2" "${RUNTIME_BIN_DIR}/containerd-shim-edgerun-v1"

          if [[ "${ACT:-}" == "true" ]]; then
            export SNAPSHOTTER=native
          fi
          sudo env PATH="${RUNTIME_BIN_DIR}:${PATH}" containerd >/tmp/containerd.log 2>&1 &
          CONTAINERD_PID=$!
          trap 'sudo kill ${CONTAINERD_PID} >/dev/null 2>&1 || true; sudo pkill -f "containerd-shim-edgerun-backend serve" >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 30); do
            if sudo ctr version >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          sudo ctr version >/dev/null

          sudo env EDGERUN_WASI_EXECUTOR_BIN="$PWD/out/target/release/edgerun-runtime" "$PWD/out/target/release/containerd-shim-edgerun-v1" serve \
            --socket-path /run/edgerun-shim/edgerun.sock \
            --data-dir /var/lib/edgerun \
            --segment runtime.timeline \
            --run-id runtime-run \
            --job-id runtime-job \
            --session-id runtime-session >/tmp/edgerun-shim-backend.log 2>&1 &

          for _ in $(seq 1 30); do
            if [[ -S /run/edgerun-shim/edgerun.sock ]]; then
              break
            fi
            sleep 1
          done
          test -S /run/edgerun-shim/edgerun.sock

          ./scripts/containerd-runtime-matrix-smoke.sh
          ./scripts/containerd-runtime-wasm-smoke.sh
          ROUNDS=10 ARTIFACT_DIR=out/containerd-runtime/soak ./scripts/containerd-runtime-soak.sh

      - name: Collect logs
        if: always()
        run: |
          mkdir -p out/containerd-runtime
          sudo cp /tmp/containerd.log out/containerd-runtime/containerd.log || true
          sudo cp /tmp/edgerun-shim-backend.log out/containerd-runtime/edgerun-shim-backend.log || true
          sudo chown -R "$(id -u):$(id -g)" out/containerd-runtime || true

      - name: Upload containerd runtime artifacts
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: containerd-runtime-${{ runner.os }}-${{ runner.arch }}
          path: out/containerd-runtime
