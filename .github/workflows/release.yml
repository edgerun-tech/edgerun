name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            archive: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER="${VERSION}-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Build CLI
        env:
          EDGERUN_BUILD_NUMBER: ${{ steps.meta.outputs.build_number }}
        run: cargo build --release -p edgerun-cli --target "${{ matrix.target }}"

      - name: Pack binary
        run: |
          mkdir -p release-artifacts
          BIN="target/${{ matrix.target }}/release/edgerun"
          OUT="release-artifacts/edgerun-${{ steps.meta.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}"
          tar -czf "$OUT" -C "$(dirname "$BIN")" "$(basename "$BIN")"

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: release-artifacts/*

  publish-release:
    runs-on: ubuntu-24.04
    needs: [build-cli]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-downloads

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find release-downloads -type f -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
