name: Runtime Provenance
run-name: "Runtime Provenance • ${{ github.ref_name }} • #${{ github.run_number }}"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_GHA_VERSION: "v1"

jobs:
  runtime-provenance:
    name: Runtime Release Provenance
    runs-on: [self-hosted, linux, x64, proxmox, edgerun]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build runtime release artifact
        env:
          RUSTC_WRAPPER: ""
        run: |
          mkdir -p /tmp/edgerun-runtime-release
          CARGO_TARGET_DIR=out/target cargo build --locked --release -p edgerun-runtime --features cli
          cp out/target/release/edgerun-runtime /tmp/edgerun-runtime-release/edgerun-runtime
          sha256sum /tmp/edgerun-runtime-release/edgerun-runtime > /tmp/edgerun-runtime-release/SHA256SUMS

      - name: Upload runtime release artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgerun-runtime-release-${{ github.sha }}
          path: /tmp/edgerun-runtime-release

      - name: Attest runtime release artifact provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: /tmp/edgerun-runtime-release/edgerun-runtime

      - name: Publish runtime provenance summary
        if: ${{ always() }}
        run: |
          {
            echo "## Runtime Provenance Summary"
            echo ""
            echo "- ref: \`${{ github.ref_name }}\`"
            echo "- commit: \`${{ github.sha }}\`"
            echo "- artifact: \`edgerun-runtime-release-${{ github.sha }}\`"
            echo "- subject path: \`/tmp/edgerun-runtime-release/edgerun-runtime\`"
            if [[ -f /tmp/edgerun-runtime-release/SHA256SUMS ]]; then
              echo "- sha256: \`$(awk '{print $1}' /tmp/edgerun-runtime-release/SHA256SUMS)\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
