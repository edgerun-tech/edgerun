name: Containerd Runtime Soak Nightly
run-name: "Containerd Runtime Soak • ${{ github.ref_name }} • #${{ github.run_number }}"

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      rounds:
        description: "Soak rounds"
        required: false
        default: "100"
      image:
        description: "Container image"
        required: false
        default: "docker.io/library/alpine:3.20"

concurrency:
  group: containerd-runtime-soak-nightly
  cancel-in-progress: false

jobs:
  soak:
    name: containerd runtime soak
    runs-on: [self-hosted, linux, x64, proxmox, edgerun]
    timeout-minutes: 120
    env:
      NAMESPACE: default
      ROUNDS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rounds || '100' }}
      IMAGE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image || 'docker.io/library/alpine:3.20' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0

      - name: Setup sccache
        if: ${{ env.ACT != 'true' }}
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust
        if: ${{ env.ACT != 'true' }}
        uses: Swatinem/rust-cache@v2

      - name: Install runtime dependencies
        run: |
          set -euo pipefail
          command -v containerd >/dev/null 2>&1 || (echo "containerd is required on runner host" >&2; exit 1)
          command -v crun >/dev/null 2>&1 || (echo "crun is required on runner host" >&2; exit 1)
          command -v protoc >/dev/null 2>&1 || (echo "protobuf-compiler (protoc) is required on runner host" >&2; exit 1)

      - name: Build EdgeRun runtime binaries (rootless)
        run: |
          set -euo pipefail
          export CARGO_TARGET_DIR=out/target
          cargo build --locked --release \
            -p edgerun-containerd-shim \
            -p edgerun-runtime \
            --features edgerun-runtime/cli

      - name: Run extended soak
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=out/target
          RUNTIME_BIN_DIR="$PWD/out/runtime-bin"
          mkdir -p "${RUNTIME_BIN_DIR}" out/containerd-runtime/soak-nightly
          install -m0755 "${CARGO_TARGET_DIR}/release/containerd-shim-edgerun-v2" "${RUNTIME_BIN_DIR}/containerd-shim-edgerun-v2"
          ln -sf "${RUNTIME_BIN_DIR}/containerd-shim-edgerun-v2" "${RUNTIME_BIN_DIR}/containerd-shim-edgerun-v1"

          if [[ "${ACT:-}" == "true" ]]; then
            export SNAPSHOTTER=native
          fi
          sudo env PATH="${RUNTIME_BIN_DIR}:${PATH}" containerd >/tmp/containerd.log 2>&1 &
          CONTAINERD_PID=$!
          trap 'sudo kill ${CONTAINERD_PID} >/dev/null 2>&1 || true; sudo pkill -f "containerd-shim-edgerun-backend serve" >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 30); do
            if sudo ctr version >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          sudo ctr version >/dev/null

          sudo env EDGERUN_WASI_EXECUTOR_BIN="$PWD/out/target/release/edgerun-runtime" "$PWD/out/target/release/containerd-shim-edgerun-v1" serve \
            --socket-path /run/edgerun-shim/edgerun.sock \
            --data-dir /var/lib/edgerun \
            --segment runtime.timeline \
            --run-id runtime-run \
            --job-id runtime-job \
            --session-id runtime-session >/tmp/edgerun-shim-backend.log 2>&1 &

          for _ in $(seq 1 30); do
            if [[ -S /run/edgerun-shim/edgerun.sock ]]; then
              break
            fi
            sleep 1
          done
          test -S /run/edgerun-shim/edgerun.sock

          ./scripts/containerd-runtime-matrix-smoke.sh "${IMAGE}"
          ROUNDS="${ROUNDS}" ARTIFACT_DIR=out/containerd-runtime/soak-nightly ./scripts/containerd-runtime-soak.sh "${IMAGE}"

      - name: Collect logs
        if: always()
        run: |
          mkdir -p out/containerd-runtime/soak-nightly
          sudo cp /tmp/containerd.log out/containerd-runtime/soak-nightly/containerd.log || true
          sudo cp /tmp/edgerun-shim-backend.log out/containerd-runtime/soak-nightly/edgerun-shim-backend.log || true
          sudo chown -R "$(id -u):$(id -g)" out/containerd-runtime || true

      - name: Upload soak artifacts
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: containerd-runtime-soak-${{ github.run_id }}
          path: out/containerd-runtime/soak-nightly
