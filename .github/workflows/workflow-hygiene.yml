name: Workflow Hygiene
run-name: "Workflow Hygiene • ${{ github.ref_name }} • #${{ github.run_number }}"

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hygiene:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow drift check
        run: ./scripts/check-workflow-drift.sh

      - name: Workflow reference integrity check
        run: ./scripts/check-workflow-references.sh

      - name: Required checks policy integrity
        run: ./scripts/check-required-checks.sh

      - name: Local workflow list integrity
        run: ./scripts/check-actions-local-workflow-list.sh

      - name: Publish workflow hygiene summary
        if: ${{ always() }}
        run: |
          {
            echo "## Workflow Hygiene Summary"
            echo ""
            echo "- drift check: completed"
            echo "- workflow_run references: completed"
            echo "- required-check policy: completed"
            echo "- local workflow file list: completed"
          } >> "$GITHUB_STEP_SUMMARY"
